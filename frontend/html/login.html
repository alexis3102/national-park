<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal - Register</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="register-body">
    <main class="register-container">
        
        <section class="register-image-section">
            <img src="../img/fondos/perro_lago.png" alt="perro" class="register-img">
        </section>

        <section class="register-form-section">
            <div class="brand-header">
                <h1 class="brand-title">Boreal</h1>
                <p class="brand-subtitle">You explored the forest in all its richness.</p>
            </div>

            <form class="register-form" action="#">
                <div class="input-group">
                    <label for="name">name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="input-group">
                    <label for="password">password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn continue-btn">continue</button>

                <p class="login-link">do you have account? <a href="register.html">register</a></p>
            </form>
        </section>

    </main>
</body>
</html>
